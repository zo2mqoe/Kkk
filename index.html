<!DOCTYPE html>
<html>
<head>
  <title>Roblox Cookie Login</title>
  <meta charset="utf-8">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #1a1a1a;
      color: #ffffff;
      margin: 0;
      padding: 0;
      height: 280px;
      width: 380px;
    }
    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
      flex-direction: column;
      box-sizing: border-box;
      padding: 20px;
    }
    h3 {
      margin-top: 0;
      margin-bottom: 15px;
      font-size: 18px;
      color: #00a2ff;
    }
    .cookie-input {
      background-color: #2b2b2b;
      border: 2px solid #444;
      color: white;
      padding: 10px;
      text-align: left;
      font-size: 14px;
      margin-bottom: 12px;
      border-radius: 6px;
      width: 100%;
      height: 40px;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.3s;
    }
    .cookie-input:focus {
      border-color: #00a2ff;
    }
    .cookie-input.errored {
      border-color: #ED4245;
    }
    .button {
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      color: #fff;
      background-color: #00a2ff;
      border: none;
      border-radius: 6px;
      width: 100%;
      height: 40px;
      transition: background-color 0.2s, transform 0.1s;
    }
    .button:hover {
      background-color: #0084d1;
    }
    .button:active {
      transform: scale(0.98);
    }
    .button:disabled {
      background-color: #555555;
      cursor: not-allowed;
    }
    .error {
      font-size: 13px;
      color: #ED4245;
      margin-top: 10px;
      text-align: center;
      min-height: 20px;
      display: none;
    }
    .error.shown {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h3>Roblox Cookie Login</h3>
    <input type="text" class="cookie-input" placeholder="วางโค้ด .ROBLOSECURITY ที่นี่..." autocomplete="off">
    <button class="button">Set Cookie & Login</button>
    <div class="error"></div>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
